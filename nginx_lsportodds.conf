# 메인 사이트 (웹 UI) - Cloudflare가 SSL 처리
server {
    listen 80;
    server_name matchdata.net www.matchdata.net;

    server_tokens off;
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/matchdata_access.log;
    error_log /var/log/nginx/matchdata_error.log;
}

# API 서브도메인 (api.matchdata.net) - Cloudflare가 SSL 처리
server {
    listen 80;
    server_name api.matchdata.net;

    server_tokens off;
    client_max_body_size 1m;

    location / {
        # OPTIONS preflight 처리
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        # CORS 헤더
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key" always;
        add_header Access-Control-Expose-Headers "x-ratelimit-limit, x-ratelimit-remaining, x-ratelimit-reset" always;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/matchdata_api_access.log;
    error_log /var/log/nginx/matchdata_api_error.log;
}
